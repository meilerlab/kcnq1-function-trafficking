# Use trained model to predict S4 variants. 

# am_val_plot: True
check_experiment_data: False
exclUNC: False
exclNM: False

##########
enable_test: True
include_list: "../s4_data/list_s4.txt"
exclUNC: False
exclNM: False

##########

model_features: 'origammpnnesm'
fname_model_prefix: "../saved_models/trained_on_all/save_model_state.rfc.biophys_evol_am_mpnnesm."

##############################

excludeWT: False
VSDonly: False
PDonly: False

featuresCSVList:  ["../features_8sik_clean.w_am_mpnn_esm.csv"]

###### NOTE: experiment labels for S4 set are split for codon duplicates, execute this code with each one individually

trainLabelsCSV: "../s4_data/s4_260508_w_gc.csv"
# trainLabelsCSV: "../s4_data/s4_260508_codon_not_gc.csv"

##########
labels:
  - name: iks
    rcut: [0.65, 1.4]
    pvalcut: [0.02,0.05]
    gof: larger
     
  - name: v12
    rcut: [-5,5]
    pvalcut: [0.02,0.05]
    gof: smaller
 
  - name: tau_act
    rcut: [0.7, 1.7]    
    pvalcut: [0.02,0.05]
    gof: smaller
 
  - name: tau_deact
    rcut: [0.75, 1.25]
    pvalcut: [0.02,0.05]
    gof: larger

  - name: cell_surf_exp
    rcut: [65,150]
    pvalcut: null
    gof: larger

  - name: tot_exp
    rcut: [65,150]
    pvalcut: null
    gof: larger

  - name: traffick_eff
    rcut: [65,150]
    pvalcut: null
    gof: larger
